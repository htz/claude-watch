<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Watch</title>
</head>
<body>
  <div id="app">
    <!-- Permission view -->
    <div id="permission-view" class="view hidden">
      <div class="header">
        <span id="danger-badge" class="badge"></span>
        <span id="tool-name" class="tool-name"></span>
        <span id="project-name" class="project-name hidden"></span>
        <span id="queue-badge" class="queue-badge hidden"></span>
        <button type="button" id="btn-skip" class="btn-skip">&times;</button>
      </div>

      <div class="content-scroll">
        <div id="unmatched-section" class="unmatched-section hidden">
          <div class="unmatched-label" data-i18n="ui.unmatchedLabel"></div>
          <div id="unmatched-chips" class="unmatched-chips"></div>
        </div>
        <div class="command-block">
          <code id="command-text"></code>
        </div>
        <div class="description">
          <p id="description-text"></p>
        </div>
      </div>

      <div class="actions">
        <button type="button" id="btn-deny" class="btn btn-deny" data-i18n="ui.deny"></button>
        <button type="button" id="btn-allow" class="btn btn-allow" data-i18n="ui.allow"></button>
      </div>

      <div class="shortcuts">
        <span><kbd>⌘</kbd><kbd>Enter</kbd> <span data-i18n="ui.allow"></span></span>
        <span><kbd>Esc</kbd> <span data-i18n="ui.deny"></span></span>
      </div>
    </div>

    <!-- Notification view -->
    <div id="notification-view" class="view hidden">
      <div class="header">
        <span id="notification-project-name" class="project-name hidden"></span>
        <span id="notification-queue-badge" class="queue-badge hidden"></span>
        <button type="button" id="btn-dismiss" class="btn-skip">&times;</button>
      </div>

      <div class="content-scroll">
        <div class="notification-content">
          <div id="notification-icon" class="notification-icon-large"></div>
          <div id="notification-title" class="notification-title"></div>
          <p id="notification-message" class="notification-message"></p>
        </div>
      </div>

      <div class="actions">
        <button type="button" id="btn-ok" class="btn btn-ok" data-i18n="ui.ok"></button>
      </div>

      <div class="shortcuts">
        <span><kbd>⌘</kbd><kbd>Enter</kbd> <span data-i18n="ui.close"></span></span>
      </div>
    </div>
  </div>
</body>
</html>
